<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HiddenAtlas — Travel Guides Created by Travel Designers</title>
    <meta name="description" content="A marketplace of curated travel itineraries created by local experts, creators and travel designers. Discover better routes, hidden places and practical trip plans." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- Google Fonts — preconnect first, then stylesheet (avoids render-blocking @import in CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" />

    <!-- Open Graph — og:image must be absolute for social crawlers -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="HiddenAtlas" />
    <meta property="og:title"       content="HiddenAtlas — Travel Guides Created by Travel Designers" />
    <meta property="og:description" content="A marketplace of curated travel itineraries created by local experts, creators and travel designers. Discover better routes, hidden places and practical trip plans." />
    <meta property="og:image"       content="https://www.hiddenatlas.travel/assets/logo-hiddenatlas.svg" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="HiddenAtlas — Travel Guides Created by Travel Designers" />
    <meta name="twitter:description" content="A marketplace of curated travel itineraries created by local experts, creators and travel designers. Discover better routes, hidden places and practical trip plans." />
    <meta name="twitter:image"       content="https://www.hiddenatlas.travel/assets/logo-hiddenatlas.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
